name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv run --extra save pytest --cov=companion_core --cov-report=term-missing --cov-fail-under=90
      - name: Coverage summary
        if: always()
        run: uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  build:
    # wheel を実際に build し、必須モジュール同梱 + clean env での import を検証する。
    # editable install では露見しない packaging 不具合 (build 失敗 / モジュール欠落) を捕捉。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"   # wheel は requires-python >=3.14。venv を 3.14 で作る
      - uses: astral-sh/setup-uv@v7
      - name: build wheel
        run: uv build --wheel
      - name: verify wheel contents
        run: python3 scripts/check_wheel.py
      - name: install built wheel in clean env and import
        run: |
          python3 -m venv /tmp/wenv
          /tmp/wenv/bin/pip install dist/*.whl
          /tmp/wenv/bin/python -c "import companion_core.console_providers as cp; import companion_core.console.service as s; print('OK:', cp.__name__, s.__name__)"
