name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv
      - run: uv pip install -e .
      - run: uv run python -m unittest discover -s tests -p "test_*.py" -v
